<main><br><br>
<h4>Deadline December 15, 2027</h4><br>
<h4>Be sure to RSVP for yourself only. If you have been granted a plus-one, you will be notified in advance, and your guest must submit a separate RSVP</h4>	
<form id="RSVPForm"
	  >

<label for="name">Full Name:</label><br>
    <input type="text" id="name" required><br><br>
	
<label for="myEmail">*E-mail:</label><br>
<input type="email" id="myEmail" name="myEmail" required="required"><br><br>
	
<label for="myPhone">Phone:</label><br>
<input type="tel" id="myPhone" name="myPhone" maxlength="12"><br><br>

<label for="attending">Will you attend?</label>
    <select id="attending">
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select><br><br>
	

    <button type="submit">Submit</button>
	</form>	
	
	<p id="message"></p>
